name: deploy to ec2
on:
  push:
    branches:
      - main  
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST}}
          username: ubuntu
          key: ${{ secrets.SSH_KEY}}
          script: |
            cd ~/aws
            git pull
            sudo docker compose down
            sudo docker compose up -d --build




      